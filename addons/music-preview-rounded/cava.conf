[general]
framerate = 30
bars = 12
bar_width = 2
bar_spacing = 1
autosens = 1
sensitivity = 80

[input]
method = pipewire
source = auto

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 100
bar_delimiter = 59
frame_delimiter = 10

[smoothing]
integral = 70
monstercat = 1
gravity = 110
noise_reduction = 75
